# =============================================================================
# SAML2 profile — activate with: --spring.profiles.active=saml2
# =============================================================================
# Requires a running SAML2 IdP (Keycloak) — see saml2/README.md

# IdP metadata endpoint (Keycloak running on port 8180)
saml2.idp.metadata-uri=http://localhost:8180/realms/mprdemo/protocol/saml/descriptor

# SP signing credentials (generated by saml2/generate-sp-credentials.sh)
saml2.sp.signing.key-location=classpath:credentials/sp-key.pem
saml2.sp.signing.cert-location=classpath:credentials/sp-cert.pem

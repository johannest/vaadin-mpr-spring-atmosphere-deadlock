# =============================================================================
# MPR Deadlock Reproducer — Spring Boot Configuration
# =============================================================================

# --- Server (embedded mode only) ---
# These server.* properties are ONLY used by the embedded Tomcat when running
# with 'mvn spring-boot:run'.  When deployed as a WAR to WebSphere, the
# context root comes from ibm-web-ext.xml (<context-root uri="/mprdemo"/>)
# and these properties are ignored.
#
# Embedded:  http://localhost:8080/mprdemo/
# WebSphere: http://localhost:9080/mprdemo/
server.servlet.context-path=/mprdemo
server.port=8080

# --- Vaadin ---
vaadin.closeIdleSessions=false

# Disable Spring Boot's default whitelabel error page
server.error.whitelabel.enabled=false

# --- Logging ---
# Show relevant logs for debugging the deadlock
logging.level.com.vaadin.flow.server.communication.AtmospherePushConnection=DEBUG
logging.level.com.vaadin.mpr.core.MprPushConnection=DEBUG
logging.level.com.vaadin.flow.server.VaadinSession=DEBUG
logging.level.com.vaadin.flow.server.VaadinService=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.atmosphere=WARN

# =============================================================================
# SAML2 test IdP (Keycloak) for the deadlock reproducer.
#
# Usage:
#   cd saml2
#   docker compose up -d
#
# Admin console: http://localhost:8180  (admin / admin)
# SAML metadata: http://localhost:8180/realms/mprdemo/protocol/saml/descriptor
# =============================================================================
version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --http-port=8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      # Map to 8180 to avoid conflict with the Vaadin app on 8080
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
